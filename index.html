<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Room Navigator Debug</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
    }

    .app {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    .panel {
      background: #101d33;
      border: 1px solid #263b5f;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background: black;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #263b5f;
    }

    video,
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      padding: 13px 16px;
      margin: 6px 6px 6px 0;
      border: 0;
      border-radius: 12px;
      background: #1f6feb;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button.green {
      background: #238636;
    }

    button.red {
      background: #da3633;
    }

    #status {
      white-space: pre-wrap;
      background: #06101f;
      border: 1px solid #263b5f;
      padding: 12px;
      border-radius: 12px;
      line-height: 1.45;
    }

    .ok {
      color: #3fb950;
    }

    .bad {
      color: #ff7b72;
    }

    .warn {
      color: #d29922;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>AI Room Navigator — Debug Version</h1>

    <div class="panel">
      <button onclick="checkSystem()">1. Check System</button>
      <button class="green" onclick="startCamera()">2. Start Camera</button>
      <button onclick="loadAI()">3. Load AI Model</button>
      <button onclick="startDetection()">4. Start Detection</button>
      <button class="red" onclick="stopEverything()">Stop</button>
    </div>

    <div class="panel">
      <div class="video-wrap">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <div class="panel">
      <h3>Status</h3>
      <div id="status">Ready. Press “Check System”.</div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusBox = document.getElementById("status");

    let stream = null;
    let model = null;
    let running = false;

    function log(message, type = "") {
      const prefix = type === "ok" ? "✅ " : type === "bad" ? "❌ " : type === "warn" ? "⚠️ " : "• ";
      statusBox.textContent += "\n" + prefix + message;
      console.log(message);
    }

    function resetLog(message) {
      statusBox.textContent = message;
      console.log(message);
    }

    function checkSystem() {
      resetLog("System check:");

      log("URL: " + location.href);

      if (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1") {
        log("Secure context OK", "ok");
      } else {
        log("Camera may fail. Use HTTPS or localhost.", "bad");
      }

      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        log("getUserMedia available", "ok");
      } else {
        log("getUserMedia NOT available. Camera cannot start.", "bad");
      }

      if (window.tf) {
        log("TensorFlow.js script loaded", "ok");
      } else {
        log("TensorFlow.js script NOT loaded", "bad");
      }

      if (window.cocoSsd) {
        log("COCO-SSD script loaded", "ok");
      } else {
        log("COCO-SSD script NOT loaded", "bad");
      }

      log("Browser: " + navigator.userAgent);
    }

    async function startCamera() {
      resetLog("Starting camera...");

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("navigator.mediaDevices.getUserMedia is not available. Use HTTPS or a supported browser.");
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment"
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        log("Camera started", "ok");
        log("Video size: " + canvas.width + " x " + canvas.height, "ok");
      } catch (error) {
        log("Camera failed: " + error.name + " — " + error.message, "bad");
      }
    }

    async function loadAI() {
      resetLog("Loading AI model...");

      try {
        if (!window.tf) {
          throw new Error("TensorFlow.js did not load.");
        }

        if (!window.cocoSsd) {
          throw new Error("COCO-SSD did not load.");
        }

        await tf.ready();
        log("TensorFlow backend: " + tf.getBackend(), "ok");

        model = await cocoSsd.load({
          base: "lite_mobilenet_v2"
        });

        log("COCO-SSD model loaded", "ok");
      } catch (error) {
        log("AI model failed: " + error.name + " — " + error.message, "bad");
      }
    }

    async function startDetection() {
      if (!stream) {
        resetLog("Start camera first.");
        return;
      }

      if (!model) {
        resetLog("Load AI model first.");
        return;
      }

      running = true;
      resetLog("Detection running...");
      detectLoop();
    }

    async function detectLoop() {
      if (!running) return;

      try {
        canvas.width = video.videoWidth || canvas.width;
        canvas.height = video.videoHeight || canvas.height;

        const predictions = await model.detect(video);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        predictions.forEach(prediction => {
          if (prediction.score < 0.45) return;

          const [x, y, width, height] = prediction.bbox;

          ctx.strokeStyle = "#00ff99";
          ctx.lineWidth = 3;
          ctx.strokeRect(x, y, width, height);

          ctx.fillStyle = "#00ff99";
          ctx.font = "18px Arial";

          const label = `${prediction.class} ${Math.round(prediction.score * 100)}%`;
          ctx.fillText(label, x + 6, y > 22 ? y - 6 : y + 22);
        });

        statusBox.textContent =
          "Detection running...\n" +
          "Objects: " + predictions.length + "\n" +
          predictions
            .filter(p => p.score >= 0.45)
            .map(p => `${p.class} ${Math.round(p.score * 100)}%`)
            .join("\n");

      } catch (error) {
        log("Detection error: " + error.message, "bad");
      }

      requestAnimationFrame(detectLoop);
    }

    function stopEverything() {
      running = false;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      resetLog("Stopped.");
    }

    window.addEventListener("error", event => {
      log("Page error: " + event.message, "bad");
    });

    window.addEventListener("unhandledrejection", event => {
      log("Promise error: " + event.reason, "bad");
    });
  </script>
</body>
</html>
